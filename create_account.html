<!DOCTYPE html>
<html>
<head>
    <title>Create Bank Account</title>

    <style>

        body{
            background-color:#f2f2f2;
            font-family:Arial;
        }

        .container{
            width:450px;
            margin:40px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h2{
            text-align:center;
            color:darkblue;
        }

        label{
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid gray;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:darkblue;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:blue;
        }

        .message{
            color:green;
            text-align:center;
            font-weight:bold;
            margin-top:15px;
        }

        a{
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="container">

<h2>🏦 Global Trust Bank</h2>

<h3 style="text-align:center;">Create New Account</h3>

<form method="POST">

    {% csrf_token %}

    <label>Account Number</label>

    <input
        type="number"
        name="account_number"
        required
    >

    <label>Account Holder Name</label>

    <input
        type="text"
        name="name"
        required
    >

    <label>Phone Number</label>

    <input
        type="text"
        name="phone_number"
        required
    >

    <label>Address</label>

    <input
        type="text"
        name="address"
        required
    >

    <label>Opening Balance</label>

    <input
        type="number"
        step="0.01"
        name="balance"
        required
    >

    <button type="submit">
        Create Account
    </button>

</form>

{% if message %}

<div class="message">

{{ message }}

</div>

{% endif %}

<br>

<a href="/">
<button type="button">
⬅ Back to Home
</button>
</a>

</div>

</body>
</html>
